[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["data_generator", "spark_jobs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.sqlfluff.core]
dialect = "snowflake"
templater = "dbt"
sql_file_exts = ".sql"

[tool.sqlfluff.indentation]
indent_unit = "space"
tab_space_size = 4
