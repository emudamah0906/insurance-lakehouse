# ─────────────────────────────────────────────────────────────────────────────
#  Insurance Claims Lakehouse — local Docker stack
#  Services: MinIO · Postgres · Airflow (init + webserver + scheduler)
#  Phase 7 adds: Metabase (commented out below until needed)
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-build: &airflow-build
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__SECRET_KEY: "insurance-lakehouse-dev-only"
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  # MinIO / S3 — used by Airflow operators and PySpark jobs
  AIRFLOW_CONN_AWS_DEFAULT: "aws://minioadmin:minioadmin123@?endpoint_url=http%3A%2F%2Fminio%3A9000"
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin123
  AWS_ENDPOINT_URL: http://minio:9000
  # PySpark tuning for local Docker mode
  SPARK_DRIVER_MEMORY: 4g
  PYSPARK_PYTHON: python3
  # Snowflake — Phase 5 (values injected from .env or CI secrets)
  SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-YQ26829.ca-central-1.aws}
  SNOWFLAKE_USER: ${SNOWFLAKE_USER:-MAHESHEMUDAPURAM}
  SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
  SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-TRANSFORMER}
  SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-INSURANCE_DW}
  SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-COMPUTE_WH}

x-airflow-volumes: &airflow-volumes
  - ./airflow/dags:/opt/airflow/dags
  - ./airflow/plugins:/opt/airflow/plugins
  - airflow_logs:/opt/airflow/logs
  - ./spark_jobs:/opt/airflow/spark_jobs
  - ./data_generator:/opt/airflow/data_generator
  - ./great_expectations:/opt/airflow/great_expectations
  - ./dbt:/opt/airflow/dbt

services:

  # ── Object storage (S3-compatible) ─────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse
    restart: unless-stopped

  # Creates default buckets on first boot; retries until MinIO accepts connections
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 minioadmin minioadmin123 2>/dev/null; do
          echo 'MinIO not ready yet — retrying in 3s...'; sleep 3;
        done;
        mc mb --ignore-existing local/raw;
        mc mb --ignore-existing local/bronze;
        mc mb --ignore-existing local/silver;
        mc mb --ignore-existing local/gold;
        mc mb --ignore-existing local/quarantine;
        echo 'All buckets ready.';
      "
    networks:
      - lakehouse

  # ── Airflow metadata database ───────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse
    restart: unless-stopped

  # ── Airflow one-time init (db migrate + admin user) ────────────────────────
  airflow-init:
    <<: *airflow-build
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || echo 'Admin user already exists — skipping.'
      "
    networks:
      - lakehouse

  # ── Airflow webserver ───────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-build
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lakehouse
    restart: unless-stopped

  # ── Airflow scheduler ───────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-build
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lakehouse
    restart: unless-stopped

  # ── Metabase (uncomment in Phase 7) ────────────────────────────────────────
  # metabase:
  #   image: metabase/metabase:latest
  #   container_name: metabase
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     MB_DB_TYPE: postgres
  #     MB_DB_DBNAME: metabase
  #     MB_DB_PORT: 5432
  #     MB_DB_USER: airflow
  #     MB_DB_PASS: airflow
  #     MB_DB_HOST: postgres
  #   networks:
  #     - lakehouse
  #   restart: unless-stopped

networks:
  lakehouse:
    driver: bridge

volumes:
  minio_data:
  postgres_data:
  airflow_logs:
